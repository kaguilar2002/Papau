<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El mapa del reencuentro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   EL MAPA DEL REENCUENTRO — estilos
   Paleta: bosque profundo, salvia, pergamino, rosa polvo, ámbar
   =========================================================== */

:root{
  --forest-deep:   #2F4A3E;
  --forest-mid:    #4C6E58;
  --sage:          #8FA98A;
  --parchment:     #EFE6D3;
  --parchment-dk:  #E2D5B8;
  --dusk:          #3B3654;
  --rose:          #C98A7D;
  --amber:         #D9A441;
  --ink:           #33302A;
  --cream:         #FBF6EA;

  --font-display: "Nunito", serif;
  --font-hand: "Cormorant Garamond", cursive;
  --font-body: "Nunito", sans-serif;
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }

body{
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--forest-deep);
  overflow-x: hidden;
}

.hidden{ display:none !important; }

button{ font-family: inherit; cursor:pointer; border:none; background:none; }

/* ---------- botones ---------- */
.btn{
  font-family: var(--font-display);
  font-size: 1.05rem;
  letter-spacing: .02em;
  padding: 14px 34px;
  border-radius: 999px;
  transition: transform .35s ease, box-shadow .35s ease, opacity .6s ease;
}
.btn-primary{
  background: linear-gradient(135deg, var(--forest-mid), var(--forest-deep));
  color: var(--cream);
  box-shadow: 0 8px 24px rgba(47,74,62,.35);
}
.btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 12px 30px rgba(47,74,62,.45); }
.btn-primary:active{ transform: translateY(0); }

.icon-btn{
  width:42px; height:42px;
  border-radius:50%;
  background: rgba(255,255,255,.16);
  color: var(--cream);
  display:flex; align-items:center; justify-content:center;
  backdrop-filter: blur(4px);
  transition: background .25s ease;
}
.icon-btn:hover{ background: rgba(255,255,255,.28); }

/* ===========================================================
   PANTALLA INICIAL
   =========================================================== */
.screen{ min-height:100vh; width:100%; position:relative; }

.intro-sky{ position:relative; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.intro-bg{ position:absolute; inset:0; width:100%; height:100%; z-index:0; }

.intro-clouds ellipse{ animation: driftCloud 40s linear infinite; }
@keyframes driftCloud{
  0%{ transform: translateX(-20px); }
  50%{ transform: translateX(20px); }
  100%{ transform: translateX(-20px); }
}
.intro-birds path{ animation: birdBob 3s ease-in-out infinite; }
@keyframes birdBob{ 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-6px);} }

.intro-content{
  position:relative; z-index:1;
  max-width: 620px;
  margin: 0 24px;
  padding: 48px 40px 40px;
  text-align:center;
}

.intro-eyebrow{
  font-family: var(--font-hand);
  font-size: 1.5rem;
  color: var(--dusk);
  margin: 0 0 4px;
  opacity:.85;
}

.letter-box{
  background: rgba(251,246,234,.92);
  border-radius: 22px;
  padding: 40px 34px;
  box-shadow: 0 20px 50px rgba(47,74,62,.25);
  min-height: 260px;
  display:flex;
  align-items:center;
  border: 1px solid rgba(47,74,62,.12);
}

.letter-text{
  font-family: var(--font-hand);
  font-size: 1.65rem;
  line-height: 1.55;
  color: var(--ink);
  white-space: pre-wrap;
  text-align:left;
  margin:0;
}
.letter-text .cursor{
  display:inline-block;
  width: 2px;
  background: var(--forest-deep);
  animation: blink 1s step-start infinite;
  margin-left:1px;
}
@keyframes blink{ 50%{ opacity:0; } }

#start-btn{ margin-top: 30px; opacity:0; transform: translateY(10px); }
#start-btn.reveal{ animation: fadeUp 1s ease forwards; }
@keyframes fadeUp{ to{ opacity:1; transform: translateY(0); } }

/* ===========================================================
   PANTALLA DEL MAPA
   =========================================================== */
#map-screen{
  background:
    radial-gradient(ellipse at 20% 0%, #4C6E58 0%, transparent 55%),
    radial-gradient(ellipse at 80% 30%, #395848 0%, transparent 50%),
    linear-gradient(180deg, #2F4A3E 0%, #24392F 40%, #1D2E26 100%);
  min-height:100vh;
  padding-bottom: 60px;
}

.map-header{
  position: sticky; top:0; z-index:20;
  display:flex; align-items:center; gap:18px;
  padding: 18px 22px;
  background: rgba(29,46,38,.72);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.header-title{ flex: 0 0 auto; }
.header-kicker{
  display:block;
  font-family: var(--font-hand);
  font-size: 1rem;
  color: var(--amber);
  line-height:1;
}
.header-title h1{
  font-family: "Cormorant Garamond", serif;
  font-weight: 600;
  color: var(--cream);
  font-size: 1.5rem;
  margin: 2px 0 0;
}

.progress-wrap{ flex:1; min-width:0; }
.progress-label{
  margin:0 0 6px;
  font-size:.82rem;
  color: var(--parchment);
  opacity:.85;
}
.progress-track{
  position:relative;
  height: 10px;
  background: rgba(255,255,255,.14);
  border-radius: 999px;
  overflow: visible;
}
.progress-fill{
  height:100%;
  width:0%;
  border-radius:999px;
  background: linear-gradient(90deg, var(--sage), var(--amber));
  transition: width 1s ease;
}
.progress-leaf{
  position:absolute; top:50%; transform: translate(-50%,-50%);
  left:0%; transition: left 1s ease;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));
}

/* ---------- mapa / camino ---------- */
.map-wrap{ position:relative; max-width: 640px; margin: 0 auto; padding-top: 30px; }
.path-svg{ position:absolute; top:0; left:0; width:100%; height:auto; z-index:0; }
.stations-layer{ position:relative; z-index:1; }

.station{
  position:absolute;
  transform: translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  width: 118px;
}

.station-btn{
  width: 78px; height:78px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  background: radial-gradient(circle at 35% 30%, #6E9179, #3F6350);
  box-shadow: 0 10px 20px rgba(0,0,0,.35), inset 0 0 0 3px rgba(255,255,255,.12);
  transition: transform .3s ease, box-shadow .3s ease;
}
.station-btn svg{ width:38px; height:38px; }

.station.locked .station-btn{
  background: radial-gradient(circle at 35% 30%, #4a4a45, #2b2b28);
  filter: grayscale(.6);
  box-shadow: 0 6px 14px rgba(0,0,0,.35);
}
.station.locked .station-btn:hover{ transform:none; }
.station.locked .station-btn{ cursor: default; }

.station.today .station-btn{
  animation: glowPulse 2.2s ease-in-out infinite;
  cursor:pointer;
}
@keyframes glowPulse{
  0%,100%{ box-shadow: 0 0 0 0 rgba(217,164,65,.55), 0 10px 20px rgba(0,0,0,.35); }
  50%{ box-shadow: 0 0 0 14px rgba(217,164,65,0), 0 10px 20px rgba(0,0,0,.35); }
}

.station.done .station-btn{
  background: radial-gradient(circle at 35% 30%, var(--amber), #B87F2C);
  cursor:pointer;
}
.station:not(.locked) .station-btn:hover{ transform: translateY(-4px) scale(1.05); }

.station-lock{
  position:absolute; bottom:-4px; right:-4px;
  width:26px; height:26px; border-radius:50%;
  background: var(--dusk); display:flex; align-items:center; justify-content:center;
  box-shadow: 0 3px 8px rgba(0,0,0,.4);
}
.station-lock svg{ width:14px; height:14px; }

.station-star{
  position:absolute; top:-8px; right:-6px;
  width:26px; height:26px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));
}

.station-num{
  margin-top:8px;
  font-family: var(--font-display);
  font-weight:600;
  color: var(--cream);
  font-size:.8rem;
  background: rgba(0,0,0,.28);
  padding: 2px 10px;
  border-radius: 999px;
}
.station-name{
  margin-top:2px;
  font-family: var(--font-hand);
  font-size: 1.05rem;
  color: var(--amber);
  text-align:center;
  line-height:1.1;
}

/* mirador final */
.station.final-station .station-btn{ width:100px; height:100px; }
.station.final-station .station-btn svg{ width:50px; height:50px; }

/* luciérnagas del mirador final */
.final-fx{ position:absolute; inset:0; pointer-events:none; z-index:2; }
.firefly{
  position:absolute;
  width:6px; height:6px;
  border-radius:50%;
  background: var(--amber);
  box-shadow: 0 0 8px 3px rgba(217,164,65,.8);
  animation: fireflyFloat 6s ease-in-out infinite;
}
@keyframes fireflyFloat{
  0%,100%{ transform: translate(0,0); opacity:.2; }
  50%{ transform: translate(12px,-18px); opacity:1; }
}

/* ===========================================================
   MODALES
   =========================================================== */
.modal-overlay{
  position:fixed; inset:0; z-index:50;
  background: rgba(29,35,30,.55);
  backdrop-filter: blur(3px);
  display:flex; align-items:center; justify-content:center;
  padding: 20px;
  animation: fadeIn .35s ease;
}
@keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }

.modal-card{
  position:relative;
  background: var(--cream);
  border-radius: 24px;
  max-width: 460px;
  width:100%;
  padding: 40px 32px 32px;
  text-align:center;
  box-shadow: 0 30px 60px rgba(0,0,0,.4);
  animation: popIn .4s cubic-bezier(.2,.9,.3,1.2);
  max-height: 88vh;
  overflow-y:auto;
}
@keyframes popIn{ from{ opacity:0; transform: scale(.92) translateY(14px);} to{opacity:1; transform:scale(1) translateY(0);} }

.modal-close{
  position:absolute; top:14px; right:16px;
  font-size:1.1rem; color: var(--ink); opacity:.5;
}
.modal-close:hover{ opacity:1; }

.modal-daynum{
  font-family: var(--font-hand);
  font-size: 1.2rem;
  color: var(--rose);
  margin:0 0 6px;
}
.modal-icon{ width:64px; height:64px; margin: 0 auto 10px; }
.modal-icon svg{ width:100%; height:100%; }

.modal-title{
  font-family: var(--font-display);
  font-style: italic;
  font-weight:600;
  font-size: 1.55rem;
  color: var(--forest-deep);
  margin: 0 0 12px;
}
.modal-quote{
  font-family: var(--font-hand);
  font-size: 1.3rem;
  color: var(--dusk);
  margin: 0 0 16px;
  line-height:1.4;
}
.modal-desc{
  font-size:.98rem;
  line-height:1.6;
  color: var(--ink);
  margin: 0 0 26px;
  text-align:left;
}
.already-done{
  margin-top:14px;
  font-size:.88rem;
  color: var(--forest-mid);
}

/* carta especial */
.letter-card{ max-width: 520px; }
.letter-modal-body{
  font-family: var(--font-hand);
  font-size: 1.4rem;
  line-height:1.6;
  color: var(--ink);
  text-align:left;
  white-space: pre-wrap;
  margin-bottom: 24px;
}
.letter-modal-body h3{
  font-family: var(--font-display);
  font-style:italic;
  font-size: 1.5rem;
  color: var(--forest-deep);
  margin: 0 0 14px;
}

/* ===========================================================
   CONFETI DE HOJAS Y PÉTALOS
   =========================================================== */
.confetti-layer{
  position:fixed; inset:0; z-index:60; pointer-events:none; overflow:hidden;
}
.confetti-piece{
  position:absolute; top:-30px;
  animation-name: confettiFall;
  animation-timing-function: ease-in;
  animation-fill-mode: forwards;
}
@keyframes confettiFall{
  0%{ transform: translateY(0) rotate(0deg); opacity:1; }
  100%{ transform: translateY(110vh) rotate(360deg); opacity:.2; }
}

/* estrella dorada al completar */
.burst-star{
  position:fixed; z-index:61; pointer-events:none;
  animation: starBurst 1.1s ease-out forwards;
}
@keyframes starBurst{
  0%{ transform: scale(.2) rotate(0deg); opacity:0; }
  35%{ transform: scale(1.3) rotate(20deg); opacity:1; }
  100%{ transform: scale(1) rotate(30deg) translateY(-40px); opacity:0; }
}

/* ===========================================================
   RESPONSIVE
   =========================================================== */
@media (max-width: 640px){
  .letter-text{ font-size: 1.4rem; }
  .intro-content{ padding: 34px 22px; }
  .header-title h1{ font-size: 1.25rem; }
  .station{ width: 96px; }
  .station-btn{ width:64px; height:64px; }
  .station-btn svg{ width:30px; height:30px; }
  .station-name{ font-size:.92rem; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}

</style>
</head>
<body>

<!-- ======================= PANTALLA INICIAL ======================= -->
<section id="intro-screen" class="screen">
  <div class="intro-sky">
    <svg class="intro-bg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#EAD9B4"/>
          <stop offset="45%" stop-color="#E3C9A6"/>
          <stop offset="100%" stop-color="#BFD8B8"/>
        </linearGradient>
        <linearGradient id="hillGrad1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7FA089"/>
          <stop offset="100%" stop-color="#5C7F63"/>
        </linearGradient>
        <linearGradient id="hillGrad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3F6350"/>
          <stop offset="100%" stop-color="#2F4A3E"/>
        </linearGradient>
      </defs>
      <rect width="1200" height="800" fill="url(#skyGrad)"/>
      <circle cx="960" cy="180" r="90" fill="#F3D9A4" opacity="0.85"/>
      <g class="intro-clouds">
        <ellipse cx="220" cy="140" rx="90" ry="26" fill="#FAF3E4" opacity="0.6"/>
        <ellipse cx="300" cy="120" rx="70" ry="20" fill="#FAF3E4" opacity="0.5"/>
        <ellipse cx="700" cy="90" rx="80" ry="22" fill="#FAF3E4" opacity="0.55"/>
      </g>
      <path d="M0,560 C200,480 320,560 480,520 C650,478 780,540 1000,500 C1100,480 1160,510 1200,500 L1200,800 L0,800 Z" fill="url(#hillGrad1)"/>
      <path d="M0,650 C180,600 380,660 560,610 C760,556 900,630 1200,600 L1200,800 L0,800 Z" fill="url(#hillGrad2)"/>
      <g class="intro-birds" opacity="0.55" stroke="#3B3654" stroke-width="4" fill="none" stroke-linecap="round">
        <path d="M480,150 q10,-14 20,0 q10,-14 20,0"/>
        <path d="M540,180 q10,-12 20,0 q10,-12 20,0"/>
      </g>
    </svg>

    <div class="intro-content">
      <p class="intro-eyebrow">Papau</p>
      <div id="letter-box" class="letter-box">
        <p id="letter-text" class="letter-text"></p>
      </div>
      <button id="start-btn" class="btn btn-primary hidden">Comenzar el viaje</button>
    </div>
  </div>
</section>

<!-- ======================= PANTALLA DEL MAPA ======================= -->
<section id="map-screen" class="screen hidden">

  <header class="map-header">
    <div class="header-title">
      <span class="header-kicker">Un viaje</span>
      <h1>(Des)conocido</h1>
    </div>

    <div class="progress-wrap">
      <p id="progress-label" class="progress-label">Has recorrido 0 de 15 pasos</p>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
        <svg class="progress-leaf" id="progress-leaf" viewBox="0 0 24 24" width="22" height="22">
          <path d="M12 2C7 2 3 6 3 11c0 6 9 11 9 11s9-5 9-11c0-5-4-9-9-9z" fill="#D9A441"/>
        </svg>
      </div>
    </div>

    <button id="sound-toggle" class="icon-btn" aria-label="Activar sonido">
      <svg viewBox="0 0 24 24" width="22" height="22"><path id="sound-icon-path" d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/></svg>
    </button>
  </header>

  <main class="map-wrap">
    <svg id="path-svg" class="path-svg" viewBox="0 0 400 3400" preserveAspectRatio="xMidYMin meet" xmlns="http://www.w3.org/2000/svg">
      <!-- fondo pintado, senderos y decoraciones se generan por JS -->
    </svg>
    <div id="stations-layer" class="stations-layer"></div>

    <div id="final-fx" class="final-fx hidden">
      <div class="fireflies" id="fireflies"></div>
    </div>
  </main>
</section>

<!-- ======================= MODAL DE RETO ======================= -->
<div id="challenge-modal" class="modal-overlay hidden">
  <div class="modal-card">
    <button class="modal-close" id="modal-close">✕</button>
    <p id="modal-daynum" class="modal-daynum">Día 1</p>
    <div id="modal-icon" class="modal-icon"></div>
    <h2 id="modal-title" class="modal-title"></h2>
    <p id="modal-quote" class="modal-quote"></p>
    <p id="modal-desc" class="modal-desc"></p>
    <button id="complete-btn" class="btn btn-primary">He completado este reto</button>
    <p id="already-done" class="already-done hidden">✓ Completado — vuelve cuando quieras a leerlo de nuevo.</p>
  </div>
</div>

<!-- ======================= MODAL DE CARTA ESPECIAL ======================= -->
<div id="letter-modal" class="modal-overlay hidden">
  <div class="modal-card letter-card">
    <button class="modal-close" id="letter-modal-close">✕</button>
    <div id="letter-modal-body" class="letter-modal-body"></div>
    <button id="letter-modal-continue" class="btn btn-primary">Continuar</button>
  </div>
</div>

<!-- capa de confeti de hojas/pétalos -->
<div id="confetti-layer" class="confetti-layer"></div>

<audio id="ambient-audio"
       src="music/bosque.mp3"
       loop
       preload="auto"></audio>

<script>
/* ===========================================================
   EL MAPA DEL REENCUENTRO — lógica
   =========================================================== */

const STORAGE_KEY = "mapaReencuentro_v1";

/* ---------- 1. Datos de los 15 retos ---------- */
const DAYS = [
  {
    id: 1, place: "El árbol enorme", icon: "tree",
    title: "El árbol que escucha",
    quote: "Hoy solo vamos a llegar, sin prisa, sin pedirle nada al camino.",
    desc: "Busca un lugar tranquilo, siéntate y apoya una mano sobre tu pecho. Respira profundo tres veces. Con cada respiración, agradece en silencio a tu cuerpo por haberte sostenido hasta hoy, incluso en los días difíciles. No hace falta decir nada más: solo estar aquí, quieta, respirando. Puede iniciar con un ´´gracias por´´"
  },
  {
    id: 2, place: "El puente", icon: "bridge",
    title: "El puente hacia la acción",
    quote: "Cada movimiento es un pequeño puente entre cómo te sientes y cómo quieres sentirte.",
    desc: "Cierra los ojos. Imagina que eres un jarrón o una pieza de cerámica que has moldeado. Piensa en como podrías hacer esa figura con tu cuerpo, ríete sí es necesario jajajaj. Al terminar, recuerda el infinito de formas que puede ser tu cuerpo porque así como la arcilla se transforma: sin juzgarlo, solo observando y moviéndose"
  },
  {
    id: 3, place: "La cascada", icon: "waterfall",
    title: "La cascada que limpia",
    quote: "No todo pensamiento que llega merece quedarse a vivir contigo.",
    desc: "Toma un papel. Escribe un pensamiento poco amable que sueles tener sobre tu cuerpo. Léelo una vez, en voz baja. Luego rómpelo, dóblalo o táchalo, como si lo dejaras caer en una cascada. Termina escribiendo una sola frase amable para reemplazarlo. Algunos compuestos pesados deben irse en una casacada muy fuerte, puede que sí lo soltamos sean más livianos y puedan irse"
  },
  {
    id: 4, place: "El lago", icon: "lake",
    title: "El espejo del lago",
    quote: "Mirarte no tiene por qué doler. Hoy solo vamos a mirar, con calma.",
    desc: "Ponte frente a un espejo un minuto completo. No busques defectos ni cosas para arreglar: solo observa, como quien mira un paisaje. Si aparece una crítica, déjala pasar como una nube imagina que es un paisaje, son las montañas de los picos de europa en Asturias. Al terminar, di en voz alta: «Gracias por estar aquí conmigo», Los picos de europa son un reflejó de tu cuerpo.. de tí."
  },
  {
    id: 5, place: "La fogata", icon: "campfire",
    title: "El calor que agradece",
    quote: "Tu cuerpo lleva toda la vida cuidándote, aunque no siempre lo notes.",
    desc: "Haz una lista de 5 cosas que tu cuerpo hace por ti todos los días sin que se lo pidas: respirar, sanar heridas, sostenerte al caminar, permitirte abrazar a quien quieres. Léela despacio, como si fuera una carta de agradecimiento 💛.",
    special: true
  },
  {
    id: 6, place: "El campo de flores", icon: "flowers",
    title: "El jardín de las caricias",
    quote: "Tus manos también saben dar cariño hacia adentro.",
    desc: "Frota tus manos hasta sentir calor. Coloca una sobre tu mejilla y otra sobre tu corazón. Quédate así un minuto, respirando despacio. Es un gesto pequeño, pero tu cuerpo lo entiende como lo que es: ternura."
  },
  {
    id: 7, place: "La cueva", icon: "cave",
    title: "El dibujo del pensmaiento",
    quote: "¿Dibujas lo que piensas o lo que eres?",
    desc: "Agarra lapiz y papel, cierra los ojos, e intenta dibujar tu cuerpo, muuuy consciente, tomate el tiempo necesario, y no puedes abrir los ojos. Cunando termines mira lo lindo que dibujaste y lo que casi no te gustó, en realidad no será perfecto el dibujo pero con esto quiero que pienses que tu cuerpo es físico y lo que crees de el son solo pensamientos. Unos más dolorosos que otros pero solo son esos, pensamiento, doblala y guardala. Tu cuerpo es el habitas aquí y ahora."

/* ---------- 4. Estado / localStorage ---------- */
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { startDate: null, completed: [], seenLetters: [] };
}
function saveState(state){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState();

function ensureStarted(){
  if(!state.startDate){
    state.startDate = Date.now();
    saveState(state);
  }
}

function unlockedCount(){
  const elapsedMs = Date.now() - state.startDate;
  const elapsedDays = Math.floor(elapsedMs / (24*60*60*1000)) + 1;
  return Math.min(Math.max(elapsedDays, 1), 15);
}

/* ---------- 5. Pantalla inicial: efecto máquina de escribir ---------- */
const LETTER_INTRO = `Helloooooo, no se te olvide el reto
pon alarmassssssss si es necesarioooo
ATT:Dani.
❤️`;

function typewriter(el, text, speed, onDone){
  let i = 0;
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  cursor.textContent = " ";
  function step(){
    if(i <= text.length){
      el.textContent = text.slice(0, i);
      el.appendChild(cursor);
      i++;
      setTimeout(step, speed);
    }else{
      cursor.remove();
      if(onDone) onDone();
    }
  }
  step();
}

function initIntro(){
  const letterTextEl = document.getElementById("letter-text");
  const startBtn = document.getElementById("start-btn");
  typewriter(letterTextEl, LETTER_INTRO, 28, () => {
    startBtn.classList.remove("hidden");
    startBtn.classList.add("reveal");
  });
  startBtn.addEventListener("click", () => {
    ensureStarted();
    document.getElementById("intro-screen").classList.add("hidden");
    document.getElementById("map-screen").classList.remove("hidden");
    buildMap();
  });
}

/* ---------- 6. Construir el mapa ---------- */
const VB_W = 400, VB_H = 3400;
function stationCoords(){
  const coords = [];
  const sideOffsets = [110, 290, 200]; // izquierda, derecha, centro-ish, alternando
  for(let i=0; i<15; i++){
    const y = 170 + i * 220;
    let x;
    const cycle = i % 4;
    if(cycle === 0) x = 120;
    else if(cycle === 1) x = 240;
    else if(cycle === 2) x = 280;
    else x = 140;
    coords.push({x, y});
  }
  return coords;
}

function buildPathD(coords){
  let d = `M ${coords[0].x} ${coords[0].y}`;
  for(let i=1;i<coords.length;i++){
    const prev = coords[i-1], cur = coords[i];
    const midY = (prev.y + cur.y)/2;
    d += ` C ${prev.x} ${midY}, ${cur.x} ${midY}, ${cur.x} ${cur.y}`;
  }
  return d;
}

function decorSVG(){
  // elementos pintados de fondo: colinas suaves, arbolitos, matorrales
  let s = "";
  for(let i=0;i<10;i++){
    const y = 60 + i*340;
    s += `<ellipse cx="${i%2===0?60:340}" cy="${y}" rx="90" ry="46" fill="#3F6350" opacity="0.35"/>`;
  }
  for(let i=0;i<26;i++){
    const y = 40 + i*130 + (i%3)*20;
    const x = (i%2===0) ? 30 + (i%5)*12 : 350 - (i%5)*12;
    s += `<g transform="translate(${x},${y}) scale(0.5)">${iconSVG("tree")}</g>`;
  }
  return s;
}

function buildMap(){
  const coords = stationCoords();
  const pathSvg = document.getElementById("path-svg");
  pathSvg.setAttribute("viewBox", `0 0 ${VB_W} ${VB_H}`);
  pathSvg.innerHTML = `
    <defs>
      <linearGradient id="mapBg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#33513F"/>
        <stop offset="100%" stop-color="#1D2E26"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="${VB_W}" height="${VB_H}" fill="url(#mapBg)"/>
    <g opacity="0.9">${decorSVG()}</g>
    <path d="${buildPathD(coords)}" fill="none" stroke="#EFE6D3" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 22" opacity="0.85"/>
  `;

  const layer = document.getElementById("stations-layer");
  layer.style.position = "relative";
  layer.style.height = `${(VB_H / VB_W) * 100}vw`; // placeholder, corregido con JS de resize
  layer.innerHTML = "";

  const unlocked = unlockedCount();

  coords.forEach((c, idx) => {
    const day = DAYS[idx];
    const dayNum = idx + 1;
    const isDone = state.completed.includes(dayNum);
    const isUnlocked = dayNum <= unlocked;
    const isToday = isUnlocked && !isDone;

    const wrap = document.createElement("div");
    wrap.className = "station" + (isDone ? " done" : (isUnlocked ? " today" : " locked")) + (dayNum===15 ? " final-station" : "");
    wrap.style.left = (c.x / VB_W * 100) + "%";
    wrap.style.top = (c.y / VB_H * 100) + "%";

    wrap.innerHTML = `
      <div class="station-btn">
        <svg viewBox="0 0 24 24">${iconSVG(day.icon)}</svg>
        ${!isUnlocked ? `<div class="station-lock">${lockSVG}</div>` : ""}
        ${isDone ? `<div class="station-star">${starSVG}</div>` : ""}
      </div>
      <span class="station-num">Día ${dayNum}</span>
      <span class="station-name">${day.place}</span>
    `;

    if(isUnlocked){
      wrap.addEventListener("click", () => openChallenge(dayNum));
    }
    layer.appendChild(wrap);
  });

  updateProgress(unlocked);
  positionLayerHeight();
  window.addEventListener("resize", positionLayerHeight);

  if(unlocked >= 15 && state.completed.includes(15)){
    activateFinalScene();
  }
}

function positionLayerHeight(){
  const pathSvg = document.getElementById("path-svg");
  const layer = document.getElementById("stations-layer");
  const w = pathSvg.getBoundingClientRect().width;
  layer.style.height = (w * (VB_H / VB_W)) + "px";
  pathSvg.style.height = (w * (VB_H / VB_W)) + "px";
}

function updateProgress(unlockedOverride){
  const done = state.completed.length;
  document.getElementById("progress-label").textContent = `Has recorrido ${done} de 15 pasos`;
  const pct = (done/15) * 100;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-leaf").style.left = pct + "%";
}

/* ---------- 7. Modal de reto ---------- */
let currentDay = null;

function openChallenge(dayNum){
  currentDay = dayNum;
  const day = DAYS[dayNum-1];
  document.getElementById("modal-daynum").textContent = `Día ${dayNum} · ${day.place}`;
  document.getElementById("modal-icon").innerHTML = `<svg viewBox="0 0 24 24" style="color:#4C6E58">${iconSVG(day.icon).replace(/#EFE6D3/g,'#3F6350')}</svg>`;
  document.getElementById("modal-title").textContent = day.title;
  document.getElementById("modal-quote").textContent = `"${day.quote}"`;
  document.getElementById("modal-desc").textContent = day.desc;

  const isDone = state.completed.includes(dayNum);
  document.getElementById("complete-btn").classList.toggle("hidden", isDone);
  document.getElementById("already-done").classList.toggle("hidden", !isDone);

  document.getElementById("challenge-modal").classList.remove("hidden");
}

function closeChallenge(){
  document.getElementById("challenge-modal").classList.add("hidden");
}

function completeChallenge(){
  if(currentDay == null) return;
  if(!state.completed.includes(currentDay)){
    state.completed.push(currentDay);
    saveState(state);
  }
  closeChallenge();
  launchConfetti();
  launchStarBurst();
  buildMap();

  if(LETTERS[currentDay]){
    setTimeout(() => openLetter(currentDay), 900);
  }
  if(currentDay === 15){
    setTimeout(activateFinalScene, 1200);
  }
}

/* ---------- 11. Sonido ambiental (generado, sin archivos externos) ---------- */
let audioCtx = null, ambientNodes = null, soundOn = false;

function buildAmbientSound(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ruido tipo "viento/agua" con filtro pasa-bajos suave
  const bufferSize = 2 * audioCtx.sampleRate;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  let lastOut = 0;
  for(let i=0;i<bufferSize;i++){
    const white = Math.random()*2-1;
    lastOut = (lastOut + (0.02 * white)) / 1.02;
    output[i] = lastOut * 3.5;
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;

  const filter = audioCtx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 700;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.16;

  noise.connect(filter).connect(gain).connect(audioCtx.destination);
  noise.start();

  ambientNodes = { noise, filter, gain };
}

function toggleSound(){

  const audio = document.getElementById("ambient-audio");
  const path = document.getElementById("sound-icon-path");

  if(audio.paused){

      audio.volume = 0.35;
      audio.play();

      path.setAttribute(
        "d",
        "M4 9v6h4l5 5V4L8 9H4zM16.5 12a3.5 3.5 0 0 0-2-3.16v6.32A3.5 3.5 0 0 0 16.5 12z"
      );

  }else{

      audio.pause();

      path.setAttribute(
        "d",
        "M4 9v6h4l5 5V4L8 9H4z"
      );

  }

}
